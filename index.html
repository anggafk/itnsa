<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITNSA Digital Archive - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --sauber-blue: #002D72;
            --petronas-cyan: #00A19C;
            --speed-white: #FDFDFD;
            --red-bull-red: #E10600;
            /* Warna Brand */
            --insta-pink: #E4405F;
            --yt-red: #FF0000;
            --tiktok-black: #000000;
            --fb-blue: #1877F2;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--speed-white);
            color: #1e293b;
            height: 100vh;
            overflow: hidden;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--petronas-cyan); }

        /* Social Link Styles */
        .social-link { color: rgba(255, 255, 255, 0.5); transition: all 0.3s ease; }
        .social-link:hover { transform: translateY(-1px); opacity: 1 !important; }
        .social-link.insta:hover { color: var(--insta-pink) !important; }
        .social-link.yt:hover { color: var(--yt-red) !important; }
        .social-link.tiktok:hover { color: #fff !important; }
        .social-link.fb:hover { color: var(--fb-blue) !important; }

        /* UI Components */
        .sidebar-item:hover { background-color: #f1f5f9; }
        .sidebar-active { background-color: #eff6ff; border-right: 3px solid var(--petronas-cyan); color: var(--sauber-blue); font-weight: 700; }
        
        .stat-card {
            background: white;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }
        .stat-card:hover { border-color: var(--petronas-cyan); shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }

        .loader {
            border-top-color: var(--petronas-cyan);
            animation: spinner 1.2s linear infinite;
        }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .file-row:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="flex flex-col">

    <!-- Header Sauber Blue dengan Border Petronas -->
    <header class="bg-[#002D72] border-b-4 border-[#00A19C] shrink-0 shadow-lg relative z-20 text-white">
        <div class="px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <span class="bg-[#E10600] w-1.5 h-6 rounded-full shadow-[0_0_10px_rgba(225,6,0,0.5)]"></span>
                <div>
                    <h1 class="text-lg font-black tracking-tight flex items-center gap-2">
                        ITNSA <span class="text-[#00A19C]">DIGITAL</span> ARCHIVE
                    </h1>
                    <p class="text-[10px] text-blue-200/50 font-mono uppercase tracking-widest leading-none">High-Performance System</p>
                </div>
            </div>
            
            <div class="hidden md:flex items-center gap-6">
                <div class="text-right">
                    <p class="text-[10px] text-blue-200/50 font-bold uppercase tracking-tighter leading-none">Repository</p>
                    <a href="https://github.com/anggafk/itnsa" target="_blank" class="text-xs text-blue-100 hover:text-[#00A19C] transition font-medium italic">anggafk/itnsa</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="flex grow overflow-hidden">
        
        <!-- Sidebar (Folder Tree) - Light Mode -->
        <aside class="w-60 border-r border-slate-200 bg-slate-50 hidden lg:flex flex-col shrink-0 overflow-y-auto">
            <div class="p-4 border-b border-slate-200 flex items-center justify-between bg-white/50">
                <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Explorer</span>
                <button onclick="fetchContents('')" class="p-1 hover:bg-slate-200 rounded text-slate-400 hover:text-[#00A19C] transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
            <div id="sidebar-tree" class="py-2 text-sm text-slate-600">
                <!-- Sidebar folders -->
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="grow flex flex-col min-w-0 bg-white">
            
            <!-- Dashboard Stats - Kotak Diperkecil -->
            <div class="px-6 py-4 grid grid-cols-2 md:grid-cols-4 gap-3 shrink-0 bg-slate-50/50 border-b border-slate-100">
                <div class="stat-card p-2 px-3 rounded-lg flex flex-col">
                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Total File</span>
                    <span id="stat-files" class="text-base font-black text-[#002D72] font-mono">--</span>
                </div>
                <div class="stat-card p-2 px-3 rounded-lg flex flex-col">
                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Direktori</span>
                    <span id="stat-folders" class="text-base font-black text-[#E10600] font-mono">--</span>
                </div>
                <div class="stat-card p-2 px-3 rounded-lg flex flex-col">
                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Status</span>
                    <span class="text-base font-black text-green-600 flex items-center gap-1.5">
                        LIVE <span class="flex h-1.5 w-1.5 rounded-full bg-green-500 animate-ping"></span>
                    </span>
                </div>
                <div class="stat-card p-2 px-3 rounded-lg flex flex-col">
                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Format</span>
                    <span id="stat-ext" class="text-base font-black text-slate-700 font-mono truncate">JSON</span>
                </div>
            </div>

            <!-- Toolbar: Breadcrumbs & Search (Kotak Kosong) -->
            <div class="px-6 py-3 flex flex-col md:flex-row items-center justify-between gap-4">
                <nav id="breadcrumbs" class="flex items-center text-xs font-bold text-[#00A19C] overflow-x-auto whitespace-nowrap py-1">
                    <!-- Breadcrumbs -->
                </nav>
                <div class="relative w-full md:w-64">
                    <input type="text" id="search-input" placeholder="" 
                           class="w-full pl-10 pr-4 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-[#00A19C] focus:bg-white transition text-slate-800">
                    <svg class="w-4 h-4 absolute left-3.5 top-2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>

            <!-- Table View Area -->
            <div class="grow overflow-y-auto relative">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] sticky top-0 bg-white z-10 border-b border-slate-100">
                            <th class="px-8 py-3">Asset Name</th>
                            <th class="px-8 py-3 hidden sm:table-cell w-32">Size</th>
                            <th class="px-8 py-3 text-right w-32">Action</th>
                        </tr>
                    </thead>
                    <tbody id="file-list-body" class="divide-y divide-slate-50">
                        <!-- List rows -->
                    </tbody>
                </table>

                <!-- Loading State -->
                <div id="loading" class="hidden absolute inset-0 bg-white/80 flex flex-col items-center justify-center z-20">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-10 w-10 mb-3"></div>
                    <p class="text-[#00A19C] font-black text-[10px] uppercase tracking-widest animate-pulse font-mono">Syncing Data...</p>
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="hidden py-32 flex flex-col items-center justify-center text-center px-4">
                    <svg class="w-12 h-12 text-slate-200 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <p class="text-slate-400 font-bold text-sm uppercase tracking-tighter">Data Not Found</p>
                    <button onclick="clearSearch()" class="mt-4 text-[#00A19C] text-[10px] font-black uppercase hover:underline">Reset Filter</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer Sauber Blue -->
    <footer class="bg-[#002D72] border-t-2 border-[#00A19C] px-6 py-2 shrink-0 flex items-center justify-center shadow-inner">
        <div class="inline-flex items-center gap-3 px-4 py-1 bg-black/10 rounded-full border border-white/5">
            <span class="w-1 h-1 rounded-full bg-[#E10600]"></span>
            <div class="flex items-center gap-3">
                <a href="https://www.instagram.com/anggafk/" target="_blank" class="social-link insta" title="Instagram">
                    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                </a>
                <a href="https://www.youtube.com/anggafk" target="_blank" class="social-link yt" title="YouTube">
                    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                </a>
                <a href="https://www.tiktok.com/@anggafk" target="_blank" class="social-link tiktok" title="TikTok">
                    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.9-.32-1.98-.23-2.81.31-.75.42-1.24 1.25-1.33 2.1-.05.7.08 1.42.44 2.02.41.77 1.25 1.34 2.13 1.45.66.07 1.33-.03 1.92-.34.82-.44 1.34-1.29 1.4-2.22.01-3.66 0-7.33.01-11z"/></svg>
                </a>
                <a href="https://www.facebook.com/anggafk" target="_blank" class="social-link fb" title="Facebook">
                    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                </a>
            </div>
            <span class="w-1 h-1 rounded-full bg-[#00A19C]"></span>
        </div>
    </footer>

    <script>
        const USER = 'anggafk';
        const REPO = 'itnsa';
        let currentPath = '';
        let allFiles = []; 
        let fullTree = []; 
        let isSearchMode = false;

        const fileListBody = document.getElementById('file-list-body');
        const sidebarTree = document.getElementById('sidebar-tree');
        const loadingEl = document.getElementById('loading');
        const emptyStateEl = document.getElementById('empty-state');
        const searchInput = document.getElementById('search-input');
        const breadcrumbsEl = document.getElementById('breadcrumbs');

        const statFiles = document.getElementById('stat-files');
        const statFolders = document.getElementById('stat-folders');
        const statExt = document.getElementById('stat-ext');

        async function fetchFullTree() {
            const url = `https://api.github.com/repos/${USER}/${REPO}/git/trees/main?recursive=1`;
            try {
                const response = await fetch(url);
                if (!response.ok) return;
                const data = await response.json();
                fullTree = data.tree || [];
                updateDashboardStats();
                renderSidebarFolders();
            } catch (e) { console.error(e); }
        }

        function updateDashboardStats() {
            const filesOnly = fullTree.filter(i => i.type === 'blob' && !i.path.toLowerCase().includes('index.html'));
            const foldersOnly = fullTree.filter(i => i.type === 'tree');
            statFiles.innerText = filesOnly.length;
            statFolders.innerText = foldersOnly.length;
            const extensions = filesOnly.map(f => f.path.split('.').pop()).filter(ext => ext.length < 5);
            const counts = {};
            extensions.forEach(x => { counts[x] = (counts[x] || 0) + 1; });
            const topExt = Object.keys(counts).sort((a,b) => counts[b] - counts[a])[0];
            statExt.innerText = topExt ? topExt.toUpperCase() : 'N/A';
        }

        function renderSidebarFolders() {
            sidebarTree.innerHTML = '';
            const rootBtn = document.createElement('button');
            rootBtn.className = `w-full flex items-center gap-3 px-6 py-2 transition text-slate-500 hover:bg-slate-100 ${currentPath === '' ? 'sidebar-active' : ''}`;
            rootBtn.onclick = () => fetchContents('');
            rootBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg> <span class="truncate">Root Project</span>`;
            sidebarTree.appendChild(rootBtn);

            const folders = fullTree.filter(i => i.type === 'tree' && !i.path.includes('/'));
            folders.forEach(folder => {
                const btn = document.createElement('button');
                btn.className = `w-full flex items-center gap-3 px-6 py-2 transition text-slate-500 hover:bg-slate-100 ${currentPath === folder.path ? 'sidebar-active' : ''}`;
                btn.onclick = () => fetchContents(folder.path);
                btn.innerHTML = `<svg class="w-4 h-4 text-slate-400" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg> <span class="truncate">${folder.path}</span>`;
                sidebarTree.appendChild(btn);
            });
        }

        async function fetchContents(path = '') {
            currentPath = path;
            isSearchMode = false;
            showLoading(true);
            updateBreadcrumbs(path);
            renderSidebarFolders();
            try {
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${path}`);
                if (!response.ok) throw new Error('API limit or connection error');
                const data = await response.json();
                allFiles = Array.isArray(data) ? data : [data];
                allFiles.sort((a, b) => (a.type === b.type) ? a.name.localeCompare(b.name) : (a.type === 'dir' ? -1 : 1));
                renderFiles(allFiles);
            } catch (error) {
                fileListBody.innerHTML = `<tr><td colspan="3" class="px-8 py-20 text-center text-red-500 font-mono text-xs italic">[ SYSTEM ERROR: ${error.message} ]</td></tr>`;
                showLoading(false);
            }
        }

        function renderFiles(files, mode = 'normal') {
            showLoading(false);
            fileListBody.innerHTML = '';
            const visibleFiles = files.filter(file => (file.name || file.path.split('/').pop()).toLowerCase() !== 'index.html');

            if (visibleFiles.length === 0) {
                emptyStateEl.classList.remove('hidden');
                return;
            } else {
                emptyStateEl.classList.add('hidden');
            }

            if (mode === 'normal' && currentPath !== '') {
                const parentPath = currentPath.split('/').slice(0, -1).join('/');
                const backRow = document.createElement('tr');
                backRow.className = 'hover:bg-slate-50 cursor-pointer transition text-[#00A19C] border-b border-slate-50';
                backRow.onclick = () => fetchContents(parentPath);
                backRow.innerHTML = `<td class="px-8 py-3 flex items-center gap-4"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg><span class="text-[10px] font-black uppercase tracking-widest">Return to Parent</span></td><td colspan="2"></td>`;
                fileListBody.appendChild(backRow);
            }

            visibleFiles.forEach(file => {
                const name = file.name || file.path.split('/').pop();
                const path = file.path;
                const type = file.type === 'tree' ? 'dir' : (file.type === 'blob' ? 'file' : file.type);
                const isDir = type === 'dir';
                const size = file.size || 0;
                const htmlUrl = isDir ? `https://github.com/${USER}/${REPO}/tree/main/${path}` : `https://github.com/${USER}/${REPO}/blob/main/${path}`;
                const downloadUrl = isDir ? null : `https://raw.githubusercontent.com/${USER}/${REPO}/main/${path}`;

                const row = document.createElement('tr');
                row.className = 'file-row transition group border-b border-slate-50';
                row.innerHTML = `
                    <td class="px-8 py-3 flex items-center gap-4 cursor-pointer" onclick="${isDir ? `fetchContents('${path}')` : `window.open('${htmlUrl}', '_blank')`}">
                        <span class="${isDir ? 'text-[#00A19C]' : 'text-slate-400'}">
                            ${isDir ? '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>' : '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>'}
                        </span>
                        <div class="flex flex-col min-w-0">
                            <span class="text-sm font-semibold truncate group-hover:text-[#002D72] transition">${name}</span>
                            ${mode === 'search' ? `<span class="text-[9px] text-slate-400 font-mono truncate uppercase">${path}</span>` : ''}
                        </div>
                    </td>
                    <td class="px-8 py-3 text-[11px] font-mono text-slate-400 hidden sm:table-cell">${isDir ? '--' : formatBytes(size)}</td>
                    <td class="px-8 py-3 text-right">
                        <div class="flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition">
                            ${!isDir && downloadUrl ? `<a href="${downloadUrl}" download class="p-1.5 text-slate-400 hover:text-[#E10600]"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg></a>` : ''}
                            <a href="${htmlUrl}" target="_blank" class="p-1.5 text-slate-400 hover:text-[#002D72]"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg></a>
                        </div>
                    </td>
                `;
                fileListBody.appendChild(row);
            });
        }

        function showLoading(isLoading) { loadingEl.classList.toggle('hidden', !isLoading); }

        function updateBreadcrumbs(path, isSearch = false) {
            if (isSearch) { breadcrumbsEl.innerHTML = `<span class="flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> GLOBAL SEARCH</span>`; return; }
            breadcrumbsEl.innerHTML = `<span class="cursor-pointer hover:text-[#002D72] transition uppercase" onclick="fetchContents('')">/ root</span>`;
            if (path) {
                path.split('/').forEach((part, idx, arr) => {
                    const accPath = arr.slice(0, idx + 1).join('/');
                    breadcrumbsEl.innerHTML += `<span class="mx-2 text-slate-300">/</span><span class="cursor-pointer hover:text-[#002D72] transition uppercase" onclick="fetchContents('${accPath}')">${part}</span>`;
                });
            }
        }

        function formatBytes(bytes, decimals = 1) {
            if (bytes === 0) return '0 B';
            const k = 1024, i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(decimals)) + ' ' + ['B', 'KB', 'MB', 'GB'][i];
        }

        function clearSearch() { searchInput.value = ''; fetchContents(''); }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            if (term === '') { fetchContents(currentPath); return; }
            isSearchMode = true;
            updateBreadcrumbs('', true);
            const filtered = fullTree.filter(item => {
                const name = item.path.split('/').pop().toLowerCase();
                return name.includes(term) && name !== 'index.html';
            });
            renderFiles(filtered, 'search');
        });

        fetchFullTree(); 
        fetchContents(''); 
    </script>
</body>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITNSA Digital Archive - Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --sauber-blue: #002D72;
            --petronas-cyan: #00A19C;
            --speed-white: #FDFDFD;
            --red-bull-red: #E10600;
            /* Brand Colors */
            --insta-pink: #E4405F;
            --yt-red: #FF0000;
            --tiktok-black: #000000;
            --fb-blue: #1877F2;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--speed-white);
        }

        .bg-sauber { background-color: var(--sauber-blue); }
        .text-sauber { color: var(--sauber-blue); }
        .border-sauber { border-color: var(--sauber-blue); }

        .bg-petronas { background-color: var(--petronas-cyan); }
        .text-petronas { color: var(--petronas-cyan); }
        .border-petronas { border-color: var(--petronas-cyan); }
        
        .bg-redbull { background-color: var(--red-bull-red); }
        .text-redbull { color: var(--red-bull-red); }

        /* Gaya Hover Berdasarkan Identitas Brand */
        .social-link { color: rgba(255, 255, 255, 0.4); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .social-link:hover { transform: translateY(-3px); opacity: 1 !important; }
        
        .social-link.insta:hover { color: var(--insta-pink) !important; }
        .social-link.yt:hover { color: var(--yt-red) !important; }
        .social-link.tiktok:hover { color: var(--tiktok-black) !important; }
        .social-link.fb:hover { color: var(--fb-blue) !important; }

        .file-row:hover { background-color: rgba(0, 161, 156, 0.05); }
        
        .loader {
            border-top-color: var(--petronas-cyan);
            animation: spinner 1.2s linear infinite;
        }

        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--speed-white); }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--sauber-blue); }
    </style>
</head>
<body class="text-gray-900">

    <!-- Navbar/Header -->
    <header class="bg-sauber text-white shadow-lg border-b-4 border-petronas">
        <div class="max-w-5xl mx-auto px-6 pt-8 pb-0">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
                <!-- Sisi Kiri: Judul -->
                <div class="pb-6">
                    <h1 class="text-3xl font-extrabold tracking-tight flex items-center gap-3">
                        <span class="bg-redbull w-2 h-8 rounded-full"></span>
                        ITNSA <span class="text-petronas">Digital</span> Archive
                    </h1>
                    <p class="text-blue-100/80 mt-1 text-sm font-medium">
                        Repository: <a href="https://github.com/anggafk/itnsa" target="_blank" class="underline hover:text-white transition">anggafk/itnsa</a>
                    </p>
                </div>

                <!-- Sisi Kanan: Sosmed -->
                <div class="flex items-center gap-4 mb-3 self-start md:self-end">
                    <a href="https://www.instagram.com/anggafk/" target="_blank" class="social-link insta" title="Instagram">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                    </a>
                    <a href="https://www.youtube.com/anggafk" target="_blank" class="social-link yt" title="YouTube">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    </a>
                    <a href="https://www.tiktok.com/@anggafk" target="_blank" class="social-link tiktok" title="TikTok">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.9-.32-1.98-.23-2.81.31-.75.42-1.24 1.25-1.33 2.1-.05.7.08 1.42.44 2.02.41.77 1.25 1.34 2.13 1.45.66.07 1.33-.03 1.92-.34.82-.44 1.34-1.29 1.4-2.22.01-3.66 0-7.33.01-11z"/></svg>
                    </a>
                    <a href="https://www.facebook.com/anggafk" target="_blank" class="social-link fb" title="Facebook">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-10">
        <!-- Kartu Pencarian dan Breadcrumbs -->
        <div class="bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden">
            <div class="p-5 border-b border-gray-100 flex flex-col md:flex-row md:items-center justify-between gap-5 bg-gray-50/30">
                <nav id="breadcrumbs" class="flex items-center text-sm font-bold text-sauber overflow-x-auto whitespace-nowrap py-1">
                    <!-- Breadcrumbs akan disisipkan di sini -->
                </nav>
                <div class="relative w-full md:w-72">
                    <input type="text" id="search-input" placeholder="Cari file di semua folder..." class="w-full pl-10 pr-4 py-2.5 bg-white border-2 border-gray-100 rounded-xl text-sm focus:outline-none focus:border-petronas transition">
                    <svg class="w-5 h-5 absolute left-3.5 top-2.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>

            <!-- Tabel File -->
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[11px] font-black text-sauber/40 uppercase tracking-[0.1em] border-b border-gray-100 bg-gray-50/50">
                            <th class="px-8 py-4">Nama File / Folder</th>
                            <th class="px-8 py-4 hidden sm:table-cell">Ukuran</th>
                            <th class="px-8 py-4 text-right">Opsi</th>
                        </tr>
                    </thead>
                    <tbody id="file-list-body" class="divide-y divide-gray-50">
                        <!-- Daftar file akan disisipkan di sini -->
                    </tbody>
                </table>
            </div>

            <!-- Status Memuat -->
            <div id="loading" class="hidden py-32 flex flex-col items-center justify-center">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-100 h-14 w-14 mb-4"></div>
                <p class="text-sauber font-bold animate-pulse">Syncing Global Data...</p>
            </div>

            <!-- Status Kosong -->
            <div id="empty-state" class="hidden py-32 flex flex-col items-center justify-center text-center px-4">
                <div class="bg-gray-100 p-6 rounded-full mb-6 text-gray-300">
                    <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg>
                </div>
                <p class="text-sauber font-bold text-xl">Tidak Ditemukan</p>
                <p class="text-gray-500 mt-1">File tidak ditemukan dalam seluruh repositori.</p>
                <button onclick="clearSearch()" class="mt-6 text-petronas font-bold hover:underline">Hapus Pencarian</button>
            </div>
        </div>

        <footer class="mt-12 text-center">
            <div class="inline-flex items-center gap-2 px-4 py-2 bg-gray-100 rounded-full text-[10px] font-black uppercase tracking-widest text-gray-400">
                <span class="w-2 h-2 rounded-full bg-redbull"></span>
                ITNSA DIGITAL ARCHIVE
                <span class="w-2 h-2 rounded-full bg-petronas"></span>
            </div>
        </footer>
    </main>

    <script>
        const USER = 'anggafk';
        const REPO = 'itnsa';
        let currentPath = '';
        let allFiles = []; // Berisi file di folder saat ini
        let fullTree = []; // Berisi SEMUA file di seluruh repo (untuk pencarian global)
        let isSearchMode = false;

        const fileListBody = document.getElementById('file-list-body');
        const loadingEl = document.getElementById('loading');
        const emptyStateEl = document.getElementById('empty-state');
        const searchInput = document.getElementById('search-input');
        const breadcrumbsEl = document.getElementById('breadcrumbs');

        // Fungsi awal untuk mengambil semua file secara rekursif (untuk cache pencarian)
        async function fetchFullTree() {
            const url = `https://api.github.com/repos/${USER}/${REPO}/git/trees/main?recursive=1`;
            try {
                const response = await fetch(url);
                if (!response.ok) return;
                const data = await response.json();
                fullTree = data.tree || [];
            } catch (e) {
                console.error("Gagal mengambil tree global", e);
            }
        }

        // Navigasi Folder Biasa
        async function fetchContents(path = '') {
            currentPath = path;
            isSearchMode = false;
            showLoading(true);
            updateBreadcrumbs(path);
            
            const url = `https://api.github.com/repos/${USER}/${REPO}/contents/${path}`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Gagal terhubung ke API GitHub');
                
                const data = await response.json();
                allFiles = Array.isArray(data) ? data : [data];
                
                allFiles.sort((a, b) => {
                    if (a.type === b.type) return a.name.localeCompare(b.name);
                    return a.type === 'dir' ? -1 : 1;
                });

                renderFiles(allFiles);
            } catch (error) {
                console.error(error);
                fileListBody.innerHTML = `<tr><td colspan="3" class="px-8 py-20 text-center text-redbull font-bold">${error.message}</td></tr>`;
                showLoading(false);
            }
        }

        function renderFiles(files, mode = 'normal') {
            showLoading(false);
            fileListBody.innerHTML = '';

            if (files.length === 0) {
                emptyStateEl.classList.remove('hidden');
                return;
            } else {
                emptyStateEl.classList.add('hidden');
            }

            // Tombol kembali hanya di mode normal & bukan root
            if (mode === 'normal' && currentPath !== '') {
                const parentPath = currentPath.split('/').slice(0, -1).join('/');
                const backRow = document.createElement('tr');
                backRow.className = 'file-row cursor-pointer transition';
                backRow.onclick = () => fetchContents(parentPath);
                backRow.innerHTML = `
                    <td class="px-8 py-5 flex items-center gap-4">
                        <span class="text-petronas">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                        </span>
                        <span class="font-bold text-petronas text-sm">Kembali</span>
                    </td>
                    <td class="px-8 py-5 text-sm text-gray-300 hidden sm:table-cell">-</td>
                    <td class="px-8 py-5 text-right">-</td>
                `;
                fileListBody.appendChild(backRow);
            }

            files.forEach(file => {
                // Mapping data dari Git Tree API vs Content API
                const name = file.name || file.path.split('/').pop();
                const path = file.path;
                const type = file.type === 'tree' ? 'dir' : (file.type === 'blob' ? 'file' : file.type);
                const isDir = type === 'dir';
                const size = file.size || 0;
                
                // Construct URL
                const htmlUrl = isDir 
                    ? `https://github.com/${USER}/${REPO}/tree/main/${path}` 
                    : `https://github.com/${USER}/${REPO}/blob/main/${path}`;
                const downloadUrl = isDir ? null : `https://raw.githubusercontent.com/${USER}/${REPO}/main/${path}`;

                const row = document.createElement('tr');
                row.className = 'file-row transition group';
                
                const sizeStr = isDir ? '-' : formatBytes(size);
                
                row.innerHTML = `
                    <td class="px-8 py-5 flex items-center gap-4 cursor-pointer" onclick="${isDir ? `fetchContents('${path}')` : `window.open('${htmlUrl}', '_blank')`}">
                        <span class="${isDir ? 'text-petronas' : 'text-sauber'}">
                            ${isDir 
                                ? '<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>' 
                                : '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>'}
                        </span>
                        <div class="flex flex-col">
                            <span class="text-sm font-bold ${isDir ? 'text-sauber' : 'text-gray-600 group-hover:text-petronas'} truncate max-w-[200px] sm:max-w-md">
                                ${name}
                            </span>
                            ${mode === 'search' ? `<span class="text-[10px] text-gray-400 font-medium truncate max-w-[150px]">${path}</span>` : ''}
                        </div>
                    </td>
                    <td class="px-8 py-5 text-xs font-medium text-gray-400 hidden sm:table-cell">
                        ${sizeStr}
                    </td>
                    <td class="px-8 py-5 text-right">
                        <div class="flex justify-end gap-3 opacity-0 group-hover:opacity-100 transition">
                            ${!isDir && downloadUrl ? `
                                <a href="${downloadUrl}" download class="p-2 text-gray-400 hover:text-redbull hover:bg-red-50 rounded-lg transition" title="Unduh">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                </a>
                            ` : ''}
                            <a href="${htmlUrl}" target="_blank" class="p-2 text-gray-400 hover:text-sauber hover:bg-blue-50 rounded-lg transition" title="GitHub">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                            </a>
                        </div>
                    </td>
                `;
                fileListBody.appendChild(row);
            });
        }

        function showLoading(isLoading) {
            if (isLoading) {
                loadingEl.classList.remove('hidden');
                fileListBody.classList.add('hidden');
            } else {
                loadingEl.classList.add('hidden');
                fileListBody.classList.remove('hidden');
            }
        }

        function updateBreadcrumbs(path, isSearch = false) {
            if (isSearch) {
                breadcrumbsEl.innerHTML = `
                    <span class="text-gray-400 italic">Hasil Pencarian Global...</span>
                `;
                return;
            }

            breadcrumbsEl.innerHTML = `
                <span class="cursor-pointer text-sauber hover:text-petronas transition flex items-center p-2 rounded-lg hover:bg-blue-50" onclick="fetchContents('')" title="Root Folder">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                </span>
            `;
            
            if (path) {
                const parts = path.split('/');
                let currentAccumulatedPath = '';
                
                parts.forEach((part, index) => {
                    currentAccumulatedPath += (index === 0 ? '' : '/') + part;
                    const isLast = index === parts.length - 1;
                    
                    breadcrumbsEl.innerHTML += `
                        <span class="mx-1 text-gray-300">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                        </span>
                        <span class="px-2 py-1 rounded-md ${isLast ? 'text-petronas bg-cyan-50' : 'cursor-pointer hover:text-petronas hover:bg-blue-50 transition'}" 
                              ${!isLast ? `onclick="fetchContents('${currentAccumulatedPath}')"` : ''}>
                            ${part}
                        </span>
                    `;
                });
            }
        }

        function formatBytes(bytes, decimals = 1) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        function clearSearch() {
            searchInput.value = '';
            fetchContents('');
        }

        // Global Search Logic
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            
            if (term === '') {
                fetchContents(currentPath);
                return;
            }

            isSearchMode = true;
            updateBreadcrumbs('', true);
            
            // Filter dari seluruh pohon (tree) repositori
            const filtered = fullTree.filter(item => {
                const fileName = item.path.split('/').pop().toLowerCase();
                return fileName.includes(term);
            });

            renderFiles(filtered, 'search');
        });

        // Initialize
        fetchFullTree(); // Ambil struktur seluruh repo di background
        fetchContents(''); // Tampilkan root folder di awal
    </script>
</body>
</html>
